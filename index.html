<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIME BUILD ENGINEERING</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html {
  scroll-behavior: smooth;
}
section {
  scroll-margin-top: 120px;
}
</style>

</head>

<body class="bg-gray-900 text-gray-100 font-sans">

<!-- NAVBAR -->
<header class="fixed w-full z-50 bg-white/5 backdrop-blur-md border-b border-white/10">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">

    <div class="flex items-center space-x-3">
      <img src="images/logo.png" class="h-10 object-contain">
      <span class="hidden md:block text-sm tracking-widest text-gray-300">
        PRIME BUILD ENGINEERING GROUP
      </span>
    </div>

    <nav class="hidden md:flex space-x-8 text-sm tracking-wide">
      <a href="#" class="hover:text-yellow-400 transition">首頁</a>
      <a href="#services" class="hover:text-yellow-400 transition">服務</a>
      <a href="#cases" class="hover:text-yellow-400 transition">案例</a>
      <a href="#team" class="hover:text-yellow-400 transition">專業團隊</a>
      <a href="#contact" class="hover:text-yellow-400 transition">聯絡我們</a>
    </nav>

  </div>
</header>

<!-- HERO -->
<section class="relative pt-40 pb-28 px-6 text-center overflow-hidden">

  <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1503387762-592deb58ef4e')] 
              bg-cover bg-center opacity-10"></div>

  <div class="absolute inset-0 bg-gradient-to-b from-gray-900 via-gray-900/95 to-gray-900"></div>

  <div class="relative max-w-5xl mx-auto">

    <div class="flex justify-center mb-12">
      <img src="images/logo.png"
           class="w-64 md:w-[420px] object-contain drop-shadow-2xl">
    </div>

    <p class="text-xl md:text-2xl text-gray-300 font-semibold mb-6 tracking-wide">
       細節成就品質 · 專業鑄就信任
    </p>

    <p class="text-lg text-gray-400 max-w-3xl mx-auto leading-relaxed">
      專注住宅全屋裝修翻新項目 · 統一協調管理 · 嚴格品質監控
    </p>

  </div>
</section>

<!-- SERVICES -->
<section id="services" class="py-12 px-6 text-center">
  <h2 class="text-3xl font-bold mb-8">服務範圍　一站式全面裝修</h2>
  <div class="max-w-4xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-y-4 gap-x-6 text-sm md:text-base">
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>室內設計</span></div>
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>水電工程</span></div>
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>泥水油漆</span></div>
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>棚架工程</span></div>
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>傢私訂製</span></div>
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>清拆工程</span></div>
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>不銹鋼玻璃</span></div>
    <div class="flex items-center justify-center space-x-2"><span class="text-yellow-400">•</span><span>微水泥工程</span></div>
  </div>
</section>

<!-- CASES -->
<section id="cases" class="py-20 px-6">
  <div class="max-w-6xl mx-auto text-center">
    <h2 class="text-3xl font-bold mb-6">工程案例</h2>

    <div class="grid md:grid-cols-2 gap-10">

      <div class="case-item luxury bg-gray-800 p-6 rounded text-left">
        <h3 class="text-yellow-400 font-semibold mb-2">豪宅翻新</h3>
        <div class="relative overflow-hidden rounded mb-4">
          <img src="images/after.jpg" class="w-full">
          <div id="overlay1" class="absolute inset-0 overflow-hidden" style="width:50%">
            <img src="images/before.jpg" class="w-full">
          </div>
          <input type="range" min="0" max="100" value="50"
            class="absolute bottom-0 w-full"
            oninput="slide(this,'overlay1')">
        </div>
      </div>

      <div class="case-item hos bg-gray-800 p-6 rounded text-left">
        <h3 class="text-yellow-400 font-semibold mb-2">居屋翻新</h3>
        <div class="relative overflow-hidden rounded mb-4">
          <img src="images/before.jpg" class="w-full">
          <div id="overlay2" class="absolute inset-0 overflow-hidden" style="width:50%">
            <img src="images/after.jpg" class="w-full">
          </div>
          <input type="range" oninput="slide(this,'overlay2')" class="absolute bottom-0 w-full">
        </div>
      </div>

    </div>
  </div>
</section>

<!-- TEAM -->
<section id="team" class="py-20 px-6 bg-gray-800 text-center">
  <h2 class="text-3xl font-bold mb-12">專業團隊</h2>
  <p class="text-gray-400">（團隊內容保持你原本設計）</p>
</section>

<!-- CONTACT -->
<section id="contact" class="py-20 px-6 bg-gray-800">
  <div class="max-w-3xl mx-auto bg-gray-900 p-10 rounded">
    <h2 class="text-3xl font-bold text-center mb-8">免費報價諮詢</h2>
    <form id="leadForm" class="space-y-6">
      <input type="text" placeholder="姓名" required class="w-full p-4 rounded bg-gray-800">
      <input type="tel" placeholder="聯絡電話" required class="w-full p-4 rounded bg-gray-800">
      <textarea placeholder="裝修需求" rows="4" class="w-full p-4 rounded bg-gray-800"></textarea>
      <button type="submit" class="w-full bg-yellow-500 text-gray-900 py-4 rounded font-semibold">
        提交查詢
      </button>
    </form>
    <div id="successMessage" class="hidden mt-6 text-green-400 text-center">
      ✅ 已收到查詢，我們會盡快聯絡你。
    </div>
  </div>
</section>

<footer class="py-6 text-center text-gray-500">
© 2026 PRIME BUILD ENGINEERING GROUP
</footer>

<script>
function slide(range, overlayId){
  document.getElementById(overlayId).style.width = range.value + "%";
}

document.getElementById("leadForm").addEventListener("submit",function(e){
  e.preventDefault();
  this.classList.add("hidden");
  document.getElementById("successMessage").classList.remove("hidden");
});
</script>

</body>
</html>
